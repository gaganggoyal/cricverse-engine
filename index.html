<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricverse Engine</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .dashboard {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #00ffcc;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .scoreboard {
            display: flex;
            justify-content: space-around;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .score-box h2 {
            margin: 0;
            font-size: 2.5rem;
            color: #ffffff;
        }
        .score-box p {
            margin: 0;
            color: #aaaaaa;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .matchup {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ffcc00;
        }
        .commentary-box {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            min-height: 80px;
            margin-bottom: 25px;
            font-style: italic;
            line-height: 1.5;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .bowl-btn {
            background-color: #00ffcc;
            color: #121212;
            flex: 2;
        }
        .bowl-btn:hover:not(:disabled) {
            background-color: #00e6b8;
            transform: translateY(-2px);
        }
        .bowl-btn:disabled {
            background-color: #555555;
            color: #aaaaaa;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn {
            background-color: #ff4d4d;
            color: white;
            flex: 1;
        }
        .reset-btn:hover {
            background-color: #e60000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Gagan's Live Cricverse</h1>
        
        <div class="scoreboard">
            <div class="score-box">
                <h2 id="scoreDisplay">0/0</h2>
                <p>SCORE</p>
            </div>
            <div class="score-box">
                <h2 id="oversDisplay">0.0</h2>
                <p>OVERS</p>
            </div>
        </div>

        <div class="matchup" id="matchupDisplay">
            Waiting for first ball...
        </div>

        <div class="commentary-box" id="commentaryDisplay">
            Welcome to the Cricverse Engine! Press 'Bowl Next Ball' to begin the match.
        </div>

        <div class="controls">
            <button id="bowlBtn" class="bowl-btn" onclick="bowlDelivery()">Bowl Next Ball 🏏</button>
            <button class="reset-btn" onclick="resetGame()">New Match 🔄</button>
        </div>
    </div>

    <script>
        // *** CRITICAL: Ensure this matches your actual Render URL ***
        const BASE_URL = 'https://cricverse-engine.onrender.com';

        async function bowlDelivery() {
            const bowlBtn = document.getElementById('bowlBtn');
            const commentaryDisplay = document.getElementById('commentaryDisplay');
            
            // 1. Loading State (Disables the button so you can't double-click)
            bowlBtn.disabled = true;
            bowlBtn.innerText = "Bowling...";
            commentaryDisplay.innerText = "The bowler is running in...";

            try {
                // 2. Call the Python Engine
                const response = await fetch(`${BASE_URL}/api/bowl`);
                const data = await response.json();

                // 3. Check for Game Over (10 wickets)
                if (data.game_over) {
                    commentaryDisplay.innerText = data.message;
                    bowlBtn.innerText = "Innings Over";
                    return; // Stops here, leaving the button disabled!
                }

                // 4. Update the UI with fresh math
                document.getElementById('scoreDisplay').innerText = data.current_score;
                document.getElementById('oversDisplay').innerText = data.current_over;
                document.getElementById('matchupDisplay').innerText = `${data.bowler} vs ${data.batter}`;
                commentaryDisplay.innerText = data.ai_commentary;

                // 5. Turn the button back on
                bowlBtn.disabled = false;
                bowlBtn.innerText = "Bowl Next Ball 🏏";

            } catch (error) {
                console.error("Error connecting to server:", error);
                commentaryDisplay.innerText = "Error: Could not connect to the engine. Is Render awake?";
                bowlBtn.disabled = false;
                bowlBtn.innerText = "Try Again 🏏";
            }
        }

        async function resetGame() {
            const bowlBtn = document.getElementById('bowlBtn');
            const commentaryDisplay = document.getElementById('commentaryDisplay');

            commentaryDisplay.innerText = "Resetting match...";

            try {
                // Call your brand new Python POST route to wipe memory
                await fetch(`${BASE_URL}/api/reset`, { method: 'POST' });

                // Reset the screen back to zero
                document.getElementById('scoreDisplay').innerText = "0/0";
                document.getElementById('oversDisplay').innerText = "0.0";
                document.getElementById('matchupDisplay').innerText = "Ready to play.";
                commentaryDisplay.innerText = "Memory wiped. New match started! Bowl the first ball.";
                
                // Turn the button back on (in case they were in 'Innings Over' state)
                bowlBtn.disabled = false;
                bowlBtn.innerText = "Bowl Next Ball 🏏";

            } catch (error) {
                console.error("Error resetting game:", error);
                commentaryDisplay.innerText = "Error: Could not reset the game. Check Render logs.";
            }
        }
    </script>

</body>
</html>
